name: Sync LeetCode
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync LeetCode submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: python sync.py

      - name: Commit and push
        run: |
          git config --global user.name "Guruprasad GP"
          git config --global user.email "guruprasad6200@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "sync: update leetcode solutions"
          git push
